<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 성격 테스트</title>
    <meta name="description" content="나의 진짜 성격을 알아보는 8개의 간단한 MBTI 질문 테스트입니다.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="startPage">
        <h1>나의 진짜 성격은?</h1>
        <p>8개의 간단한 질문으로 알아보는<br>나의 MBTI 유형</p>
        <button class="start-btn" onclick="startTest()">테스트 시작하기</button>
    </div>

    <div class="container question-container" id="questionPage" style="display: none;">
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
        <div class="question-number" id="questionNumber">Q1</div>
        <h2 class="question-text" id="questionText">주말에 약속이 없다면?</h2>
        <div class="options">
            <button class="option-btn" onclick="selectOption('A')" id="btnA">집에 있는다</button>
            <button class="option-btn" onclick="selectOption('B')" id="btnB">밖에 나가서 사람들을 만난다</button>
        </div>
    </div>
    
    <div class="container result-container" id="resultPage" style="display: none;">
        <h2>당신의 유형은...</h2>
        <div class="mbti-result" id="mbtiResult">ESTJ</div>
        <div class="mbti-nickname" id="mbtiNickname">"엄격한 관리자"</div>
        <p class="mbti-desc" id="mbtiDesc">철저한 계획과 강력한 추진력으로 주변을 이끌어가는 타고난 리더예요.</p>
        <div class="mbti-humor">
            <span class="humor-situation" id="humorSituation">[상황] "우리 내일 뭐할까?"</span>
            <span class="humor-response" id="humorResponse">[대답] "엑셀 켰어. 말해."</span>
        </div>
        <button class="start-btn" onclick="retryTest()">테스트 다시하기</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
